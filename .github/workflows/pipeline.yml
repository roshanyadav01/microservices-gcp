name: GCP Microservices CI/CD

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
  REGION: us-central1
  CLUSTER_NAME: microservices-cluster
  REPO: microservices

jobs:

  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]

    environment: ${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - run: |
          cd terraform/env/${{ matrix.env }}
          terraform init
          terraform apply -auto-approve \
            -var-file="${{ matrix.env }}.tfvars"

  build:
    needs: terraform
    runs-on: ubuntu-latest
    environment: dev

    strategy:
      matrix:
        service: [user, payment, order]

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker $REGION-docker.pkg.dev

      - run: |
          docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/${{ matrix.service }}:${{ github.sha }} ./services/${{ matrix.service }}
          echo "---- AUTH LIST ----"
          gcloud auth list
          echo "---- CONFIG ----"
          gcloud config list
          echo "---- ACCESS TEST ----"
          gcloud artifacts repositories list --location=us-central1
          TOKEN=$(gcloud auth print-access-token)
          curl -s https://oauth2.googleapis.com/tokeninfo?access_token=$TOKEN | grep email

      - name: Docker auth (WIF-safe)
        run: |
          gcloud auth print-access-token | \
          docker login -u oauth2accesstoken --password-stdin https://$REGION-docker.pkg.dev
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    strategy:
      matrix:
        service: [user, payment, order]

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - run: |
          helm upgrade --install ${{ matrix.service }} ./helm/${{ matrix.service }} \
            --set image.repository=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/${{ matrix.service }} \
            --set image.tag=${{ github.sha }} \
            --namespace dev --create-namespace