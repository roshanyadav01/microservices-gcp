name: GCP Microservices CI/CD

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  PROJECT_NUMBER: ${{ secrets.GCP_PROJECT_NUMBER }}
  REGION: us-central1
  ZONE: us-central1-a
  CLUSTER_NAME: microservices-cluster
  REPO: microservices

jobs:

  terraform:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [dev]

    environment: ${{ matrix.env }}

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - run: |
          cd terraform/env/${{ matrix.env }}
          terraform init
          terraform apply -auto-approve \
            -var-file="${{ matrix.env }}.tfvars"

  build:
    needs: terraform
    runs-on: ubuntu-latest
    environment: dev

    strategy:
      matrix:
        service: [user, payment, order]

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: |
          echo "Logging into Artifact Registry with access token"
          gcloud auth print-access-token | \
          docker login -u oauth2accesstoken --password-stdin https://$REGION-docker.pkg.dev

      - run: |
          IMAGE_NAME=$REGION-docker.pkg.dev/dev-683008/$REPO/${{ matrix.service }}:${{ github.sha }}
          docker build -t $IMAGE_NAME ./services/${{ matrix.service }}
          docker push $IMAGE_NAME

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: dev

    strategy:
      matrix:
        service: [user, payment, order]

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.ZONE }}

      - run: |
          helm upgrade --install ${{ matrix.service }} ./helm/${{ matrix.service }}/chart.yaml \
            --set image.repository=$REGION-docker.pkg.dev/$PROJECT_ID/$REPO/${{ matrix.service }} \
            --set image.tag=${{ github.sha }} \
            --namespace dev --create-namespace